name: Python App Code Health Check

# Trigger this workflow automatically on every git push command to the main branch
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
    - name: Check out your repository files
      uses: actions/checkout@v4

    - name: Initialize a clean Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Cache dependencies to optimize build speed
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

    - name: Install Project Libraries
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Syntax Evaluation Check (Linting)
      run: |
        # Use python's built-in compiler module to verify files contain zero syntax bugs
        python -m compileall .
